<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Pitayi Machine</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #target {
            font-size: 100px;
            transition: transform 0.1s;
            cursor: pointer;
            user-select: none;
        }

        .shake {
            animation: shake 0.2s;
            filter: grayscale(1) sepia(1) hue-rotate(-50deg) saturate(5s);
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(3px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: #333; }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px #ff6b81;
            margin-top: 20px;
        }

        button:active {
            box-shadow: none;
            transform: translateY(4px);
        }

        #counter {
            font-size: 24px;
            font-weight: bold;
            color: #2f3542;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ab Maaro Jitna Maarna Hai! 😂</h1>
        <div id="target">👤</div>
        <div id="counter">Total Pitayi: 0</div>
        <button onclick="hitMe()">DHISHKOOM! 👊</button>
    </div>

    <script>
        let count = 0;
        const target = document.getElementById('target');
        const counter = document.getElementById('counter');

        function hitMe() {
            count++;
            counter.innerText = `Total Pitayi: ${count}`;
            
            // Shake effect
            target.classList.add('shake');
            
            // Remove shake class after animation
            setTimeout(() => {
                target.classList.remove('shake');
            }, 200);

            // Change emoji randomly on hit
            const reactions = ['😵', '🤕', '🥴', '🥺', '💥'];
            const randomReaction = reactions[Math.floor(Math.random() * reactions.length)];
            const originalEmoji = target.innerText;
            
            target.innerText = randomReaction;
            setTimeout(() => {
                target.innerText = '👤';
            }, 300);
        }
    </script>
</body>
</html>
